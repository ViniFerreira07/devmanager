services:
  postgres:
    image: postgres:16-alpine
    container_name: devmanager-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: devmanager
      POSTGRES_USER: devmanager
      POSTGRES_PASSWORD: devmanager

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devmanager -d devmanager"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: DevManager.Api/Dockerfile

    container_name: devmanager-api

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: >
        Host=postgres;
        Port=5432;
        Database=devmanager;
        Username=devmanager;
        Password=devmanager

    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: devmanager-frontend

    depends_on:
      - api

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000

    ports:
      - "3000:3000"

volumes:
  postgres_data: